<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <button class="menu-btn" id="menuBtn">&#9776;</button>
  <div class="logo">Claude<span>Code</span> Monitor</div>
  <div class="header-right">
    <span class="refresh-rate">SSE 实时推送</span>
    <div class="live-dot" id="liveDot"></div>
    <div class="theme-switcher">
      <button class="theme-btn" id="themeBtn">
        <div class="theme-dot" id="themeDot"></div>
        <span id="themeLabel">Dark</span>
      </button>
      <div class="theme-dropdown" id="themeDropdown"></div>
    </div>
  </div>
</header>

<div class="copy-toast" id="copyToast">已复制 Session ID</div>
<div class="error-banner" id="errorBanner">⚠ 无法连接到服务器，请确认 server.js 正在运行</div>

<!-- Permission Panel -->
<div class="permission-panel" id="permissionPanel">
  <div class="permission-header">
    <span class="permission-icon">🔒</span>
    <span class="permission-title">权限请求</span>
  </div>
  <div class="permission-body">
    <div class="permission-tool" id="permTool"></div>
    <div class="permission-detail" id="permDetail"></div>
  </div>
  <div class="permission-actions">
    <button class="perm-btn deny" id="permDeny">Deny</button>
    <button class="perm-btn allow" id="permAllow">Allow</button>
  </div>
</div>
<div class="mobile-overlay" id="mobileOverlay"></div>

<div class="layout">

  <!-- Left: Session + Tools -->
  <aside class="session-panel" id="sessionPanel">
    <!-- History back button -->
    <div class="history-back" id="historyBack">← 返回当前会话</div>

    <!-- History panel overlay -->
    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <span class="history-header-title">历史会话</span>
        <button class="history-close" id="historyClose">✕</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="panel-header panel-header-bar">
      <span>Session</span>
      <button class="history-btn" id="historyBtn">历史</button>
    </div>

    <div class="session-switcher" id="sessionSwitcher">
      <select id="sessionSelect" class="session-select"></select>
    </div>

    <div class="session-card">
      <div class="status-badge idle" id="statusBadge">
        <div class="status-dot"></div>
        <span id="statusText">空闲</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Session ID</span>
        <span class="meta-value copyable" id="sessionId" title="点击复制">—<span class="copy-tip" id="sessionTip"></span></span>
      </div>
      <div class="meta-row">
        <span class="meta-label">开始时间</span>
        <span class="meta-value" id="sessionStart">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">运行时长</span>
        <span class="meta-value" id="sessionDuration">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">工作目录</span>
        <span class="meta-value dir" id="sessionCwd">—</span>
      </div>
    </div>

    <div class="task-panel">
      <div class="task-label">当前任务</div>
      <div class="task-empty" id="taskDisplay">暂无任务</div>
    </div>

    <div class="activity-bar" id="activityBar">
      <div class="activity-dot" id="activityDot"></div>
      <span class="activity-text" id="activityText">空闲</span>
    </div>

    <div class="panel-header">工具调用记录</div>
    <div class="tool-filter">
      <input type="text" class="tool-search" id="toolSearch" placeholder="搜索工具调用...">
      <div class="filter-btns" id="filterBtns">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="read">Read</button>
        <button class="filter-btn" data-type="write">Write</button>
        <button class="filter-btn" data-type="bash">Bash</button>
        <button class="filter-btn" data-type="search">Search</button>
      </div>
    </div>
    <div class="tool-list" id="toolList">
      <div class="empty-state">等待工具调用…</div>
    </div>
  </aside>

  <!-- Right: Stats + Messages -->
  <div class="right-panel">
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="statTotal" style="color: var(--text)">0</div>
        <div class="stat-label">工具调用</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statRunning" style="color: var(--accent)">0</div>
        <div class="stat-label">进行中</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statDone" style="color: var(--green)">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statMsgs" style="color: var(--purple)">0</div>
        <div class="stat-label">消息</div>
      </div>
    </div>

    <div class="panel-header">对话历史</div>

    <div class="messages-panel" id="messagesList">
      <div class="empty-state">等待消息…</div>
    </div>

    <div class="last-updated" id="lastUpdated">尚未加载数据</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
